{% extends 'base.html'%}
{% block title %}Login{% endblock %}
{% block layout %}
<div class="d-flex vh-100 {{ config_option('login.background', 'bg-dark') }}">
    <form method="POST" class="login-form needs-validation m-auto p-4">
        <div class="d-flex flex-column mb-3">
            <img class="mx-auto mb-4 {{ config_option('login.logo', 'app-logo') }}"
                src="{{ url_for('layout.static', filename=config_option('login.logo_filename', 'logo.png')) }}">
            <p class="text-center {{ config_option('login.text', 'text-light') }}">
                {{ config["LOGIN_MESSAGE"] }}
            </p>
            {% if error is not none: %}
            <p class="text-center border rounded p-1 {{ config_option('login.alert', 'bg-danger border-danger text-light') }}">
                {{ error }}
            </p>
            {% elif request.args.get("reason") is not none and request.args.get("reason") == "denied": %}
            <p class="text-center border rounded p-1 {{ config_option('login.alert', 'bg-danger border-danger text-light') }}">
                Access denied.
            </p>
            {% endif %}
        </div>
        <input type="email" name="email-address" placeholder="Email Address" class="form-control mb-3" required autofocus>
        <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>
        <button type="submit" class="btn w-100 {{ config_option('login.button', 'btn-outline-success') }}">
            {{ config_option("login.button_text", "Login") }}
        </button> 
    </form>
</div>
{% endblock %}
