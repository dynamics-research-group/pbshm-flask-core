{% extends 'base.html'%}
{% block layout %}
<!-- layout -->
<div class="d-flex flex-column flex-md-row vh-100 {{ config_option('portal.background', 'bg-white') }}">
    <!-- content -->
    <section class="flex-grow-1 d-flex flex-column overflow-auto">
        <!-- header -->
        <header>
            <nav class="navbar border-bottom px-3 {{ config_option('portal.header_section', 'navbar-light border-secondary') }}">
                <h1 class="{{ config_option('portal.header', 'text-dark') }}">{% block title %}&nbsp;{% endblock %}</h1>
                <form class="inline-form">
                    {% block title_call_to_action %}
                    {% endblock %}
                </form>
            </nav>
        </header>
        <!-- main -->
        <main role="main" class="container-fluid flex-grow-1 mt-2 {{ config_option('portal.content_section', 'bg-transparent') }}">
            {% block content %}
            {% endblock %}
        </main>
        <!-- footer -->
        <footer class="d-flex flex-row justify-content-center p-2 {{ config_option('portal.footer_section', 'bg-light') }}">
            <div>{{ config["FOOTER_MESSAGE"] }}</div>
        </footer>
    </section>
</div>
{% endblock %}
